<div id="app">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mukta:wght@400;500;600;700&display=swap');

  #app{
    --orange:#fe8721; --orange-d:#e9740f; --ink:#15202b; --slate:#5b6675;
    --bg:#fff6ec; --card:#ffffff; --line:#f0e3d4; --green:#16a34a; --red:#dc2626; --blue:#2563eb;
    --shadow:0 10px 30px rgba(225,116,15,.14);
    font-family:'Mukta',system-ui,sans-serif;
    color:var(--ink);
    max-width:430px; margin:0 auto; position:relative;
    background:var(--bg);
    min-height:760px; border-radius:26px; overflow:hidden;
    box-shadow:0 24px 60px rgba(21,32,43,.22);
    -webkit-tap-highlight-color:transparent;
  }
  #app *{box-sizing:border-box;}
  .display{font-family:'Baloo 2',cursive;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 12px; background:linear-gradient(135deg,#fe8721,#ff6a00);
    color:#fff; position:sticky; top:0; z-index:20;
  }
  .brand{display:flex; align-items:center; gap:9px;}
  .brand .logo{
    width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.22);
    display:grid;place-items:center;font-weight:800;font-family:'Baloo 2';font-size:15px;
  }
  .brand b{font-family:'Baloo 2'; font-size:15px; letter-spacing:.2px; line-height:1;}
  .brand span{display:block;font-size:10px;opacity:.85;font-weight:500;margin-top:2px;}

  .lang{display:flex; background:rgba(255,255,255,.2); border-radius:999px; padding:3px; gap:2px;}
  .lang button{
    border:0; cursor:pointer; font-family:'Baloo 2'; font-weight:700;
    padding:6px 12px; border-radius:999px; font-size:12.5px; color:#fff; background:transparent;
    transition:.18s; letter-spacing:.3px;
  }
  .lang button.on{background:#fff; color:var(--orange-d); box-shadow:0 2px 6px rgba(0,0,0,.12);}

  .progress-wrap{padding:10px 16px 0;}
  .pbar{height:7px;background:#f3e0cd;border-radius:99px;overflow:hidden;}
  .pfill{height:100%;background:linear-gradient(90deg,#fe8721,#ffb15a);border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1);}
  .pmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--slate);margin-top:6px;font-weight:600;}

  .stage{padding:6px 16px 110px; min-height:560px;}
  .slide{animation:fade .32s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  .kicker{display:inline-flex;align-items:center;gap:7px;font-family:'Baloo 2';font-weight:700;
    font-size:12px;letter-spacing:.6px;color:var(--orange-d);background:#ffe9d4;
    padding:6px 12px;border-radius:99px;margin:14px 0 10px;text-transform:uppercase;}
  h1.title{font-family:'Baloo 2';font-size:27px;line-height:1.12;margin:0 0 8px;font-weight:800;}
  p.sub{font-size:15px;color:var(--slate);line-height:1.5;margin:0 0 16px;font-weight:500;}

  .shot{
    display:block;width:215px;margin:6px auto 14px;border-radius:20px;
    border:7px solid #1c2330;box-shadow:var(--shadow);
  }

  .cover{text-align:center;padding-top:18px;}
  .cover .badge{font-family:'Baloo 2';font-weight:800;font-size:12px;letter-spacing:1px;color:#fff;
    background:var(--orange);padding:7px 16px;border-radius:99px;display:inline-block;}
  .cover h1{font-family:'Baloo 2';font-size:34px;line-height:1.08;margin:16px 0 6px;font-weight:800;}
  .cover .tagline{font-size:15.5px;color:var(--slate);font-weight:600;margin-bottom:18px;line-height:1.5;}
  .cover .time{font-size:13px;color:var(--slate);font-weight:600;display:flex;align-items:center;gap:6px;justify-content:center;}

  .stepchip{display:flex;align-items:center;gap:10px;margin:0 0 12px;}
  .stepchip .num{width:38px;height:38px;border-radius:12px;background:var(--orange);color:#fff;
    font-family:'Baloo 2';font-weight:800;font-size:18px;display:grid;place-items:center;box-shadow:var(--shadow);flex:0 0 auto;}
  .stepchip .lbl{font-family:'Baloo 2';font-weight:700;font-size:12px;letter-spacing:.5px;color:var(--orange-d);text-transform:uppercase;}

  .points{list-style:none;padding:0;margin:8px 0 0;}
  .points li{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;margin-bottom:9px;font-size:14.5px;line-height:1.45;font-weight:500;}
  .points li .ic{width:24px;height:24px;border-radius:8px;background:#ffe9d4;color:var(--orange-d);
    font-family:'Baloo 2';font-weight:800;font-size:13px;display:grid;place-items:center;flex:0 0 auto;margin-top:1px;}

  .tip{display:flex;gap:10px;background:#eafaf0;border:1px solid #bfe9cd;border-radius:14px;
    padding:11px 13px;margin-top:14px;font-size:13.5px;color:#0f5a2e;font-weight:600;line-height:1.45;}
  .tip .em{font-size:18px;line-height:1.2;}
  .warn{background:#fff0f0;border-color:#f4c4c4;color:#8a1f1f;}

  .dd{display:flex;gap:10px;margin-top:6px;}
  .dd .col{flex:1;border-radius:16px;padding:13px;border:1px solid;}
  .dd .do{background:#eafaf0;border-color:#bfe9cd;}
  .dd .dont{background:#fff0f0;border-color:#f4c4c4;}
  .dd h4{font-family:'Baloo 2';margin:0 0 8px;font-size:14px;display:flex;align-items:center;gap:6px;}
  .dd .do h4{color:#0f7a3a;} .dd .dont h4{color:#b3261e;}
  .dd ul{margin:0;padding-left:16px;}
  .dd li{font-size:12.8px;line-height:1.4;margin-bottom:6px;font-weight:500;}

  .quiz .q{font-family:'Baloo 2';font-size:19px;font-weight:700;line-height:1.3;margin:8px 0 14px;}
  .opt{display:block;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);
    border-radius:14px;padding:14px 15px;margin-bottom:11px;font-size:15px;font-weight:600;cursor:pointer;
    font-family:'Mukta';color:var(--ink);transition:.15s;}
  .opt:active{transform:scale(.99);}
  .opt.correct{background:#eafaf0;border-color:var(--green);color:#0f5a2e;}
  .opt.wrong{background:#fff0f0;border-color:var(--red);color:#8a1f1f;}
  .qfeed{font-weight:700;font-size:14px;margin-top:6px;min-height:20px;font-family:'Baloo 2';}

  .finish{text-align:center;padding-top:30px;}
  .finish .tick{width:84px;height:84px;border-radius:50%;background:var(--green);margin:0 auto 18px;
    display:grid;place-items:center;color:#fff;font-size:44px;box-shadow:0 12px 30px rgba(22,163,74,.3);
    animation:pop .5s cubic-bezier(.3,1.4,.5,1);}
  @keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
  .finish h1{font-family:'Baloo 2';font-size:28px;margin:0 0 8px;font-weight:800;}
  .finish p{color:var(--slate);font-size:15px;font-weight:600;line-height:1.5;margin:0 0 8px;}
  .finish .score{font-family:'Baloo 2';font-size:18px;color:var(--orange-d);font-weight:800;margin-top:10px;}

  .nav{position:absolute;bottom:0;left:0;right:0;display:flex;gap:10px;padding:14px 16px;
    background:linear-gradient(180deg,rgba(255,246,236,0),#fff6ec 38%);}
  .nav button{flex:1;border:0;cursor:pointer;font-family:'Baloo 2';font-weight:800;font-size:16px;
    padding:15px;border-radius:15px;transition:.15s;letter-spacing:.3px;}
  .nav .back{background:#fff;color:var(--slate);border:1.5px solid var(--line);flex:0 0 56px;}
  .nav .next{background:linear-gradient(135deg,#fe8721,#ff6a00);color:#fff;box-shadow:var(--shadow);}
  .nav .next:active{transform:translateY(1px);}
  .nav button:disabled{opacity:.4;cursor:default;}
  .dots{position:absolute;bottom:74px;left:0;right:0;display:flex;gap:5px;justify-content:center;}
  .dots i{width:6px;height:6px;border-radius:99px;background:#e6cdb3;transition:.25s;}
  .dots i.on{width:18px;background:var(--orange);}
</style>

<div class="topbar">
  <div class="brand">
    <div class="logo">X</div>
    <div><b data-t="brand"></b><span data-t="brandsub"></span></div>
  </div>
  <div class="lang">
    <button id="enBtn" class="on" onclick="setLang('en')">EN</button>
    <button id="hiBtn" onclick="setLang('hi')">हिं</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="pbar"><div class="pfill" id="pfill"></div></div>
  <div class="pmeta"><span id="pstep"></span><span id="ppct"></span></div>
</div>

<div class="stage" id="stage"></div>

<div class="dots" id="dots"></div>
<div class="nav">
  <button class="back" id="backBtn" onclick="go(-1)">‹</button>
  <button class="next" id="nextBtn"></button>
</div>
</div>

var slides = [{"type": "cover", "badge": {"en": "XPRESSBEES TRAINING", "hi": "एक्सप्रेसबीज़ ट्रेनिंग"}, "title": {"en": "RVP Self Allocation", "hi": "RVP सेल्फ अलोकेशन"}, "tag": {"en": "Find and pick up nearby return parcels yourself — no need to wait for the hub to assign them.", "hi": "पास के रिटर्न पार्सल खुद ढूँढो और उठाओ — हब के असाइन करने का इंतज़ार नहीं।"}, "time": {"en": "5 minute lesson", "hi": "5 मिनट का पाठ"}}, {"type": "lesson", "lbl": {"en": "WHAT IS THIS", "hi": "यह क्या है"}, "title": {"en": "What is RVP Self Allocation?", "hi": "RVP सेल्फ अलोकेशन क्या है?"}, "sub": {"en": "RVP means Reverse Pickup — a parcel that has to be picked up from a customer and returned.", "hi": "RVP यानी रिवर्स पिकअप — एक पार्सल जो ग्राहक से उठाकर वापस भेजना होता है।"}, "img": "home", "points": [{"en": "On your Home screen you will see a card showing the Open RVP Pickups near you.", "hi": "होम स्क्रीन पर एक कार्ड दिखेगा जो आपके पास के खुले RVP पिकअप दिखाता है।"}, {"en": "The number changes — it depends on how many pickups are near you right now.", "hi": "यह नंबर बदलता रहता है — यह इस पर निर्भर है कि अभी आपके पास कितने पिकअप हैं।"}, {"en": "These pickups are not assigned to anyone yet — you can pick the ones near you, yourself.", "hi": "ये पिकअप अभी किसी को नहीं मिले — आप अपने पास वाले खुद चुन सकते हो।"}], "tip": {"en": "No need to wait for the hub. You choose the pickups that suit your route.", "hi": "हब का इंतज़ार नहीं। अपने रूट के हिसाब से पिकअप आप खुद चुनो।"}}, {"type": "lesson", "step": "1", "lbl": {"en": "FIND PICKUPS", "hi": "पिकअप ढूँढो"}, "title": {"en": "Open “Pickups Near You”", "hi": "“Pickups Near You” खोलो"}, "sub": {"en": "Tap the card on your Home screen to open the pickup map and list.", "hi": "होम स्क्रीन पर कार्ड पर टैप करके पिकअप मैप और लिस्ट खोलो।"}, "img": "all_map", "points": [{"en": "Blue circles on the map show how many pickups are in that area.", "hi": "मैप पर नीले गोले दिखाते हैं उस इलाके में कितने पिकअप हैं।"}, {"en": "Zoom in to see single pickups clearly on the map.", "hi": "ज़ूम करके मैप पर एक-एक पिकअप साफ़ देखो।"}, {"en": "Use “Pincode” filter on this screen to see pickups from one area only.", "hi": "इसी स्क्रीन पर “Pincode” फ़िल्टर से सिर्फ़ एक इलाके के पिकअप देखो।"}], "tip": {"en": "You can switch between “Pickups Near Me” and “All Pickups” at the top of the list.", "hi": "लिस्ट के ऊपर “Pickups Near Me” और “All Pickups” के बीच बदल सकते हो।"}}, {"type": "lesson", "step": "2", "lbl": {"en": "OPEN A SHIPMENT", "hi": "शिपमेंट खोलो"}, "title": {"en": "Tap to open a shipment", "hi": "शिपमेंट खोलने के लिए टैप करो"}, "sub": {"en": "Open any shipment to see its full details before taking it.", "hi": "लेने से पहले किसी भी शिपमेंट को खोलकर उसकी पूरी जानकारी देखो।"}, "img": "pincode", "points": [{"en": "Tap a blue dot on the map to open that shipment.", "hi": "मैप पर नीले डॉट पर टैप करो — वो शिपमेंट खुल जाएगा।"}, {"en": "Or tap a shipment in the list below — it opens the same shipment.", "hi": "या नीचे लिस्ट में किसी शिपमेंट पर टैप करो — वही शिपमेंट खुलेगा।"}, {"en": "Check the pickup address and distance before you decide.", "hi": "तय करने से पहले पिकअप का पता और दूरी देखो।"}], "tip": {"en": "Both ways — map dot or list — open the same shipment details.", "hi": "दोनों तरीक़े — मैप डॉट या लिस्ट — एक ही शिपमेंट की जानकारी खोलते हैं।"}}, {"type": "lesson", "step": "3", "lbl": {"en": "ASSIGN TO ME", "hi": "मुझे असाइन करो"}, "title": {"en": "Tap “Assign to me”", "hi": "“Assign to me” पर टैप करो"}, "sub": {"en": "When the shipment suits you, tap “Assign to me” to claim it.", "hi": "जब शिपमेंट सही लगे, तो उसे लेने के लिए “Assign to me” पर टैप करो।"}, "img": "confirm", "points": [{"en": "Tapping “Assign to me” starts the pickup process.", "hi": "“Assign to me” दबाते ही पिकअप का प्रोसेस शुरू होता है।"}, {"en": "After this, a “Swipe to confirm” bar will appear at the bottom.", "hi": "इसके बाद नीचे “Swipe to confirm” पट्टी दिखेगी।"}, {"en": "Make sure the address is correct before going ahead.", "hi": "आगे बढ़ने से पहले पक्का करो कि पता सही है।"}], "tip": {"en": "Wrong address or far away? Tap Cancel instead of assigning.", "hi": "पता ग़लत या बहुत दूर? असाइन की जगह Cancel दबाओ।"}}, {"type": "lesson", "step": "4", "lbl": {"en": "CONFIRM", "hi": "कन्फर्म करो"}, "title": {"en": "Swipe to confirm pickup", "hi": "कन्फर्म के लिए स्वाइप करो"}, "sub": {"en": "After “Assign to me”, swipe the bar fully to the right to confirm.", "hi": "“Assign to me” के बाद, कन्फर्म करने के लिए पट्टी को पूरा दाईं ओर स्वाइप करो।"}, "img": "confirm", "points": [{"en": "This step comes only after you tap “Assign to me”.", "hi": "यह स्टेप तभी आता है जब आप “Assign to me” दबाते हो।"}, {"en": "Swipe the blue bar fully to the right.", "hi": "नीली पट्टी को पूरा दाईं ओर स्वाइप करो।"}, {"en": "If something is wrong, tap Cancel before swiping.", "hi": "अगर कुछ ग़लत है, तो स्वाइप से पहले Cancel दबाओ।"}], "tip": {"en": "Confirming adds the shipment to your task list.", "hi": "कन्फर्म करते ही शिपमेंट आपकी टास्क लिस्ट में जुड़ जाता है।"}}, {"type": "lesson", "step": "5", "lbl": {"en": "SHIPMENT GRABBED", "hi": "शिपमेंट ग्रैब हुआ"}, "title": {"en": "“Shipment Grabbed” appears", "hi": "“Shipment Grabbed” दिखता है"}, "sub": {"en": "Only after you confirm, the “Shipment Grabbed” message shows up.", "hi": "कन्फर्म करने के बाद ही “Shipment Grabbed” मैसेज दिखता है।"}, "img": "grabbed", "points": [{"en": "You will see “1 Shipment Grabbed” at the bottom of the screen.", "hi": "स्क्रीन के नीचे “1 Shipment Grabbed” दिखेगा।"}, {"en": "The shipment now shows “Already Allocated” — it is locked to you.", "hi": "शिपमेंट पर “Already Allocated” दिखेगा — वो अब आपके नाम है।"}, {"en": "Another rider cannot take the same shipment now.", "hi": "अब कोई दूसरा राइडर वही शिपमेंट नहीं ले सकता।"}], "tip": {"en": "This confirms the shipment is yours. Now go and pick it up.", "hi": "इससे पक्का होता है कि शिपमेंट आपका है। अब जाकर उसे उठाओ।"}}, {"type": "lesson", "step": "6", "lbl": {"en": "ON THE TASKS SCREEN", "hi": "टास्क स्क्रीन पर"}, "title": {"en": "Find it under your Tasks", "hi": "अपने टास्क में इसे ढूँढो"}, "sub": {"en": "Your grabbed shipment moves to the Tasks screen with a “Self” tag.", "hi": "आपका ग्रैब किया शिपमेंट “Self” टैग के साथ टास्क स्क्रीन पर चला जाता है।"}, "img": "task_self", "points": [{"en": "Open the Tasks screen — your self pickup shows a “Self” badge.", "hi": "टास्क स्क्रीन खोलो — आपके सेल्फ पिकअप पर “Self” बैज दिखेगा।"}, {"en": "On the Tasks screen, use “Filter By Self Pickup” to see only your self pickups.", "hi": "टास्क स्क्रीन पर “Filter By Self Pickup” से सिर्फ़ अपने सेल्फ पिकअप देखो।"}, {"en": "Complete it like any task: Pick-Done if collected, NPR if not.", "hi": "इसे आम टास्क की तरह पूरा करो: मिला तो Pick-Done, नहीं तो NPR।"}], "tip": {"en": "“Filter By Self Pickup” is on the Tasks screen — not the Pickups Near You screen.", "hi": "“Filter By Self Pickup” टास्क स्क्रीन पर है — Pickups Near You स्क्रीन पर नहीं।"}}, {"type": "dodont", "lbl": {"en": "REMEMBER", "hi": "याद रखो"}, "title": {"en": "Do’s and Don’ts", "hi": "क्या करें और क्या नहीं"}, "doH": {"en": "Do", "hi": "करें"}, "dontH": {"en": "Don’t", "hi": "न करें"}, "do": [{"en": "Grab pickups near your route", "hi": "रूट के पास वाले पिकअप लो"}, {"en": "Open the shipment and check address", "hi": "शिपमेंट खोलकर पता देखो"}, {"en": "Confirm only after Assign to me", "hi": "Assign to me के बाद ही कन्फर्म करो"}, {"en": "Complete pickups the same day", "hi": "पिकअप उसी दिन पूरा करो"}], "dont": [{"en": "Grab more than you can do", "hi": "जितना कर सको उससे ज़्यादा मत लो"}, {"en": "Confirm a wrong address", "hi": "ग़लत पता कन्फर्म मत करो"}, {"en": "Leave grabbed pickups pending", "hi": "लिए हुए पिकअप पेंडिंग मत छोड़ो"}, {"en": "Mark fake Pick-Done", "hi": "झूठा Pick-Done मत लगाओ"}]}, {"type": "quiz", "lbl": {"en": "QUICK CHECK · Q1", "hi": "क्विक चेक · Q1"}, "qid": "q1", "q": {"en": "How do you open a shipment to see its details?", "hi": "शिपमेंट की जानकारी देखने के लिए उसे कैसे खोलते हो?"}, "opts": [{"en": "Tap a blue dot on the map, or tap the shipment in the list", "hi": "मैप पर नीले डॉट पर टैप करो, या लिस्ट में शिपमेंट पर टैप करो"}, {"en": "Shake the phone", "hi": "फ़ोन हिलाओ"}, {"en": "Call the hub", "hi": "हब को कॉल करो"}, {"en": "Wait for a notification", "hi": "नोटिफिकेशन का इंतज़ार करो"}], "answer": 0, "right": {"en": "Correct! Both the map dot and the list open the shipment.", "hi": "सही! मैप डॉट और लिस्ट दोनों शिपमेंट खोलते हैं।"}, "wrong": {"en": "Tap a blue dot on the map, or the shipment in the list.", "hi": "मैप पर नीले डॉट पर, या लिस्ट में शिपमेंट पर टैप करो।"}}, {"type": "quiz", "lbl": {"en": "QUICK CHECK · Q2", "hi": "क्विक चेक · Q2"}, "qid": "q2", "q": {"en": "What is the correct order to grab a shipment?", "hi": "शिपमेंट ग्रैब करने का सही क्रम क्या है?"}, "opts": [{"en": "Assign to me → Swipe to confirm → Shipment Grabbed", "hi": "Assign to me → Swipe to confirm → Shipment Grabbed"}, {"en": "Swipe to confirm → Assign to me → Shipment Grabbed", "hi": "Swipe to confirm → Assign to me → Shipment Grabbed"}, {"en": "Shipment Grabbed → Assign to me → Swipe", "hi": "Shipment Grabbed → Assign to me → Swipe"}, {"en": "Just swipe, nothing else", "hi": "बस स्वाइप करो, और कुछ नहीं"}], "answer": 0, "right": {"en": "Right! Assign first, then swipe, then it is grabbed.", "hi": "सही! पहले असाइन, फिर स्वाइप, फिर ग्रैब।"}, "wrong": {"en": "First Assign to me, then Swipe to confirm, then Grabbed.", "hi": "पहले Assign to me, फिर Swipe to confirm, फिर Grabbed।"}}, {"type": "quiz", "lbl": {"en": "QUICK CHECK · Q3", "hi": "क्विक चेक · Q3"}, "qid": "q3", "q": {"en": "Where is “Filter By Self Pickup”?", "hi": "“Filter By Self Pickup” कहाँ है?"}, "opts": [{"en": "On the Tasks screen", "hi": "टास्क स्क्रीन पर"}, {"en": "On the Home screen", "hi": "होम स्क्रीन पर"}, {"en": "On the Pickups Near You screen", "hi": "Pickups Near You स्क्रीन पर"}, {"en": "There is no such filter", "hi": "ऐसा कोई फ़िल्टर नहीं है"}], "answer": 0, "right": {"en": "Correct! It is on the Tasks screen.", "hi": "सही! यह टास्क स्क्रीन पर function setLang(l){
  LANG=l;
  document.getElementById('enBtn').classList.toggle('on', l==='en');
  document.getElementById('hiBtn').classList.toggle('on', l==='hi');
  render();
}
function go(d){
  var n=idx+d;
  if(n<0||n>=slides.length) return;
  idx=n; render();
  document.getElementById('stage').scrollTop=0;
}
function L(o){return (o&&o[LANG]!=null)?o[LANG]:(o&&o.en!=null?o.en:o);}

function pickQuiz(qid, opt, correct, btn){
  if(quizState[qid]!=null) return;
  quizState[qid]=opt;
  var all=btn.parentNode.querySelectorAll('.opt');
  all.forEach(function(b,i){
    if(i===correct) b.classList.add('correct');
    else if(i===opt) b.classList.add('wrong');
    b.style.pointerEvents='none';
  });
  var fb=btn.parentNode.parentNode.querySelector('.qfeed');
  var s=slides[idx];
  fb.textContent = (opt===correct)? L(s.right) : L(s.wrong);
  fb.style.color = (opt===correct)? 'var(--green)':'var(--red)';
}

function render(){
  var s=slides[idx], html='';
  document.querySelectorAll('[data-t]').forEach(function(el){
    el.textContent = UI[LANG][el.getAttribute('data-t')]||'';
  });
  var pct=Math.round((idx)/(slides.length-1)*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('pstep').textContent = UI[LANG].step+' '+(idx)+' '+UI[LANG].of+' '+(slides.length-2);
  document.getElementById('ppct').textContent = pct+'% '+UI[LANG].pct;
  if(s.type==='cover'||s.type==='finish'){document.getElementById('pstep').textContent='';}

  if(s.type==='cover'){
    html='<div class="slide cover">'
      +'<span class="badge">'+L(s.badge)+'</span>'
      +'<h1>'+L(s.title)+'</h1>'
      +'<div class="tagline">'+L(s.tag)+'</div>'
      +'<img class="shot" src="'+IMGS.home+'">'
      +'<div class="time">⏱ '+L(s.time)+'</div>'
      +'</div>';
  }
  else if(s.type==='lesson'){
    html='<div class="slide">'
      +(s.step?'<div class="stepchip"><div class="num">'+s.step+'</div><div class="lbl">'+L(s.lbl)+'</div></div>':'<div class="kicker">'+L(s.lbl)+'</div>')
      +'<h1 class="title">'+L(s.title)+'</h1>'
      +(s.sub?'<p class="sub">'+L(s.sub)+'</p>':'')
      +(s.img?'<img class="shot" src="'+IMGS[s.img]+'">':'')
      +(s.points?'<ul class="points">'+s.points.map(function(p,i){return '<li><span class="ic">'+(i+1)+'</span><span>'+L(p)+'</span></li>';}).join('')+'</ul>':'')
      +(s.tip?'<div class="tip'+(s.warn?' warn':'')+'"><span class="em">'+(s.warn?'⚠️':'💡')+'</span><span>'+L(s.tip)+'</span></div>':'')
      +'</div>';
  }
  else if(s.type==='dodont'){
    html='<div class="slide">'
      +'<div class="kicker">'+L(s.lbl)+'</div>'
      +'<h1 class="title">'+L(s.title)+'</h1>'
      +(s.sub?'<p class="sub">'+L(s.sub)+'</p>':'')
      +'<div class="dd">'
        +'<div class="col do"><h4>✅ '+L(s.doH)+'</h4><ul>'+s.do.map(function(d){return '<li>'+L(d)+'</li>';}).join('')+'</ul></div>'
        +'<div class="col dont"><h4>❌ '+L(s.dontH)+'</h4><ul>'+s.dont.map(function(d){return '<li>'+L(d)+'</li>';}).join('')+'</ul></div>'
      +'</div></div>';
  }
  else if(s.type==='quiz'){
    var chosen=quizState[s.qid];
    html='<div class="slide quiz">'
      +'<div class="kicker">'+L(s.lbl)+'</div>'
      +'<div class="q">'+L(s.q)+'</div>'
      +'<div>'+s.opts.map(function(o,i){
          var cls='opt';
          if(chosen!=null){ if(i===s.answer) cls+=' correct'; else if(i===chosen) cls+=' wrong'; }
          return '<button class="'+cls+'" '+(chosen!=null?'style="pointer-events:none"':'')+' onclick="pickQuiz(\''+s.qid+'\','+i+','+s.answer+',this)">'+L(o)+'</button>';
        }).join('')+'</div>'
      +'<div class="qfeed">'+(chosen!=null?(chosen===s.answer?L(s.right):L(s.wrong)):'')+'</div>'
      +'</div>';
  }
  else if(s.type==='finish'){
    var correct=0, total=0;
    slides.forEach(function(q){ if(q.type==='quiz'){ total++; if(quizState[q.qid]===q.answer) correct++; }});
    html='<div class="slide finish">'
      +'<div class="tick">✓</div>'
      +'<h1>'+L(s.title)+'</h1>'
      +'<p>'+L(s.body)+'</p>'
      +'<div class="score">'+L(s.scoreLbl)+': '+correct+'/'+total+'</div>'
      +'</div>';
  }

  document.getElementById('stage').innerHTML=html;

  var back=document.getElementById('backBtn'), next=document.getElementById('nextBtn');
  back.disabled = idx===0;
  if(s.type==='finish'){
    next.textContent=UI[LANG].restart;
    next.onclick=function(){ idx=0; quizState={}; render(); document.getElementById('stage').scrollTop=0; };
  } else {
    if(s.type==='cover') next.textContent=UI[LANG].start;
    else if(idx===slides.length-2) next.textContent=UI[LANG].finish;
    else next.textContent=UI[LANG].next;
    next.onclick=function(){ go(1); };
  }

  var dots='';
  for(var i=0;i<slides.length;i++){ dots+='<i class="'+(i===idx?'on':'')+'"></i>'; }
  document.getElementById('dots').innerHTML=dots;
}
render();
</script>
